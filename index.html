<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <header class="sidebar-header">
                <div class="user-avatar">
                    <img src="./IMG/nasirpic.png" alt="User">
                </div>
                <div class="header-icons">
                    <span class="icon">&#128247;</span> 
                    <span class="icon">&#9906;</span> 
                    <span class="icon">&#8942;</span> 
                </div>
            </header>
            
            <div class="search-bar">
                <input type="text" placeholder="Search or start new chat">
            </div>
            
            <div class="chat-list">
                
                <div class="chat-item active">
                    <div class="chat-avatar">
                        <img src="https://ui-avatars.com/api/?name=John+Doe&background=767676&color=fff" alt="John Doe">
                    </div>
                    <div class="chat-info">
                        <div class="chat-name-row">
                            <h3 class="chat-name">Sr.Aliyan</h3>
                            <span class="chat-time">10:42 AM</span>
                        </div>
                        <p class="chat-preview">My best teacher</p>
                    </div>
                </div>
               
                <div class="chat-item">
                    <div class="chat-avatar">
                        <img src="https://ui-avatars.com/api/?name=Design+Team&background=34B7F1&color=fff" alt="Team">
                    </div>
                    <div class="chat-info">
                        <div class="chat-name-row">
                            <h3 class="chat-name">Nasir</h3>
                            <span class="chat-time">Yesterday</span>
                        </div>
                        <p class="chat-preview">Meeting at 3 PM</p>
                    </div>
                </div>
                
                <div class="chat-item">
                    <div class="chat-avatar">
                        <img src="https://ui-avatars.com/api/?name=Family&background=E91E63&color=fff" alt="Family">
                    </div>
                    <div class="chat-info">
                        <div class="chat-name-row">
                            <h3 class="chat-name">Nabeel</h3>
                            <span class="chat-time">Monday</span>
                        </div>
                        <p class="chat-preview">Mom: See you tonight!</p>
                    </div>
                </div>
            </div>
        </aside>

        
        <main class="chat-area">
            <header class="chat-header">
                <div class="chat-avatar">
                    <img src="https://ui-avatars.com/api/?name=John+Doe&background=767676&color=fff" alt="John Doe">
                </div>
                <div class="header-info">
                    <h3 class="header-name">Sr.Aliyan</h3>
                    <span class="header-status">online</span>
                </div>
                <div class="header-icons">
                    <span class="icon">&#128269;</span> 
                    <span class="icon">&#9906;</span> 
                    <span class="icon">&#8942;</span> 
                </div>
            </header>

            <div class="messages-container">
                
                <div class="message-row received">
                    <div class="message-bubble">
                        <p>Hello! How are you Jawad ?</p>
                        <span class="message-time">10:30 AM</span>
                    </div>
                </div>
                
               
                <div class="message-row sent">
                    <div class="message-bubble">
                        <p>I'm good, thanks!</p>
                        <span class="message-time">10:32 AM</span>
                    </div>
                </div>

                
                <div class="message-row sent">
                    <div class="message-bubble">
                        <p>And you Sr</p>
                        <span class="message-time">10:33 AM</span>
                    </div>
                </div>

               
                <div class="message-row received">
                    <div class="message-bubble">
                        <p>I'm fine</p>
                        <span class="message-time">10:35 AM</span>
                    </div>
                </div>
            </div>

            <footer class="chat-footer">
                <div class="footer-icons">
                    <span class="icon">&#9786;</span> 
                    <span class="icon">&#128247;</span> 
                </div>
                <input type="text" placeholder="Type a message">
                <div class="footer-send">
                    <span class="icon">&#128293;</span> 
                    <span class="icon">&#9654;</span> 
                </div>
            </footer>
        </main>
    </div>
</body>
</html>
